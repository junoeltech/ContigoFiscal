<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="mainBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a6186;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#89253e;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="bgVolume" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.3" />
    </radialGradient>

    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="glassReflect" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.0" />
      <stop offset="40%" style="stop-color:#ffffff;stop-opacity:0.0" />
    </linearGradient>

    <linearGradient id="metalBase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#d0d0d0;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#e8e8e8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a0a0a0;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#fafafa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#808080;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="metalHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.7" />
    </linearGradient>

    <filter id="paperShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="3" dy="5" result="offsetblur" />
      <feFlood flood-color="#000000" flood-opacity="0.5" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="checkShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" />
      <feOffset dx="10" dy="15" result="offsetblur" />
      <feFlood flood-color="#000000" flood-opacity="0.6" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g>
    <path d="M50,100 Q30,100 30,130 L30,400 Q30,470 100,470 L400,470 Q470,470 470,400 L470,200 Z" fill="url(#mainBgGrad)" />
    <path d="M50,100 Q30,100 30,130 L30,400 Q30,470 100,470 L400,470 Q470,470 470,400 L470,200 Z" fill="url(#bgVolume)" style="mix-blend-mode:multiply;" />
  </g>

  <g filter="url(#paperShadow)">
    <rect x="90" y="50" width="280" height="350" rx="10" fill="url(#paperGrad)" transform="rotate(-1 230 225)" opacity="0.7" />
    
    <rect id="mainPaper" x="100" y="40" width="280" height="350" rx="10" fill="url(#paperGrad)" />
    
    <g transform="translate(100,40)">
      <g fill="#4e4376" opacity="0.6">
        <rect x="50" y="140" width="30" height="40" rx="2" />
        <rect x="90" y="110" width="30" height="70" rx="2" />
        <rect x="130" y="80" width="30" height="100" rx="2" />
        <rect x="170" y="50" width="30" height="130" rx="2" />
      </g>
      
      <g stroke="#d1d1d1" stroke-width="4" stroke-linecap="round">
        <line x1="50" y1="200" x2="230" y2="200" />
        <line x1="50" y1="220" x2="230" y2="220" />
        <line x1="50" y1="240" x2="180" y2="240" />
      </g>
    </g>
    
    <path d="M100,40 L380,40 L380,200 L100,100 Z" fill="url(#glassReflect)" style="mix-blend-mode:screen; opacity:0.3" />
  </g>

  <g filter="url(#checkShadow)">
    <def>
      <path id="checkShape" d="M80,320 L180,420 L480,120 L450,100 L180,360 L110,300 Z" />
    </def>
    
    <use xlink:href="#checkShape" fill="url(#metalBase)" stroke="#444" stroke-width="0.5"/>
    
    <use xlink:href="#checkShape" fill="url(#metalHighlight)" style="mix-blend-mode:soft-light;" />
    
    <use xlink:href="#checkShape" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.4" transform="translate(1,1)" />
  </g>
</svg>
